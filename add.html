<!DOCTYPE html>
<html>
<head>
<title>Add Chicken</title>
</head>
<body>

<h2>Add Chickens</h2>

House:
<input id="house"><br><br>

Total:
<input id="total"><br><br>

<button onclick="addChicken()">Add</button>

<script>
function addChicken(){

fetch("https://poultry-enterprise-1.onrender.com/chickens",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
house:document.getElementById("house").value,
total:parseInt(document.getElementById("total").value)
})
})
.then(res=>res.json())
.then(data=>{
alert("Added!")
console.log(data)
})

}
</script>

</body>
</html>
